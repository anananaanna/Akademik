version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tutoring_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tutoring_user
      POSTGRES_PASSWORD: tutoring_pass
      POSTGRES_DB: tutoring_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tutoring_user -d tutoring_db']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tutoring_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tutoring.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '8080:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
